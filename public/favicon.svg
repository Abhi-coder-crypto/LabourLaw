<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Central pillar -->
  <rect x="30" y="10" width="4" height="42" rx="2" fill="#a83a00"/>
  <!-- Base -->
  <rect x="18" y="52" width="28" height="5" rx="2.5" fill="#a83a00"/>
  <!-- Top beam -->
  <rect x="10" y="13" width="44" height="4" rx="2" fill="#a83a00"/>
  <!-- Centre pivot dot -->
  <circle cx="32" cy="10" r="3.5" fill="#a83a00"/>

  <!-- Left chain -->
  <line x1="14" y1="17" x2="14" y2="28" stroke="#a83a00" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="50" y1="17" x2="50" y2="28" stroke="#a83a00" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Left pan (slightly lower — tilted) -->
  <path d="M7 33 Q14 38 21 33" stroke="#a83a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <line x1="7" y1="33" x2="21" y2="33" stroke="#a83a00" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Right pan (slightly higher) -->
  <path d="M43 30 Q50 35 57 30" stroke="#a83a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <line x1="43" y1="30" x2="57" y2="30" stroke="#a83a00" stroke-width="2.2" stroke-linecap="round"/>
</svg>
